<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bebida Animo | Panel de Administración</title>
    <link rel="stylesheet" href="css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body { background: var(--bg-dark); color: white; font-family: var(--font-body); padding: 2rem; }
        .admin-container { max-width: 500px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 2rem; border-radius: var(--radius-lg); border: 1px solid rgba(255,255,255,0.1); }
        h1 { font-family: var(--font-heading); color: var(--c-cyan); text-align: center; margin-bottom: 0.5rem; }
        p.subtitle { text-align: center; color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-main); font-weight: bold; }
        select, input { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: var(--radius-sm); font-family: inherit; }
        select:focus, input:focus { outline: none; border-color: var(--c-cyan); }
        
        .btn-save { width: 100%; padding: 15px; background: var(--c-gradient); color: var(--bg-dark); border: none; border-radius: var(--radius-pill); font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: 0.3s; margin-top: 1rem; }
        .btn-save:hover { opacity: 0.9; transform: scale(1.02); }
        
        .alert { background: rgba(236, 64, 122, 0.1); border: 1px dashed var(--c-pink); color: var(--c-pink); padding: 1rem; border-radius: var(--radius-sm); margin-bottom: 1.5rem; font-size: 0.85rem; text-align: center; }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>Control de Sucursales</h1>
        <p class="subtitle">Modifica el estatus de cada ubicación individualmente</p>

        <div class="alert">
            <i class='bx bx-info-circle'></i> 
            <b>Admin:</b> Selecciona si una sucursal está abierta (horario normal) o cerrada por algún evento o clima.
        </div>

        <!-- Sucursal Pinos -->
        <div style="background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: var(--radius-md); margin-bottom: 2rem; border: 1px solid rgba(0,255,255,0.1);">
            <h3 style="color: var(--c-cyan); margin-bottom: 1rem;"><i class='bx bxs-map'></i> Geo Los Pinos 1</h3>
            <div class="form-group">
                <label>Estatus</label>
                <select id="status-pinos-override">
                    <option value="normal">Operación Normal</option>
                    <option value="closed">CERRADO (Evento/Clima)</option>
                </select>
            </div>
            <div class="form-group" id="group-pinos-msg">
                <label>Mensaje de Cierre</label>
                <input type="text" id="msg-pinos" placeholder="Ej. Cerrado por evento privado" value="Cerrado por evento privado">
            </div>
        </div>

        <!-- Sucursal Rio Medio -->
        <div style="background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: var(--radius-md); margin-bottom: 2rem; border: 1px solid rgba(0,255,255,0.1);">
            <h3 style="color: var(--c-cyan); margin-bottom: 1rem;"><i class='bx bxs-map'></i> Río Medio 1</h3>
            <div class="form-group">
                <label>Estatus</label>
                <select id="status-rio-override">
                    <option value="normal">Operación Normal</option>
                    <option value="closed">CERRADO (Evento/Clima)</option>
                </select>
            </div>
            <div class="form-group" id="group-rio-msg">
                <label>Mensaje de Cierre</label>
                <input type="text" id="msg-rio" placeholder="Ej. Cerrado por clima" value="Cerrado por clima">
            </div>
        </div>

        <button class="btn-save" id="btn-save" onclick="saveConfigs()">
            <i class='bx bx-save'></i> Guardar Cambios
        </button>

        <div style="text-align: center; margin-top: 1.5rem;">
            <a href="index.html" style="color: var(--c-cyan); text-decoration: none; font-size: 0.9rem;">&larr; Volver a la VCard</a>
        </div>
    </div>

    <script>
        // Load existing configurations
        function loadConfigs() {
            const pinos = JSON.parse(localStorage.getItem('bebidaAnimo_pinos') || '{"status":"normal","message":""}');
            const rio = JSON.parse(localStorage.getItem('bebidaAnimo_rio') || '{"status":"normal","message":""}');

            document.getElementById('status-pinos-override').value = pinos.status;
            document.getElementById('msg-pinos').value = pinos.message || "Cerrado por evento privado";
            
            document.getElementById('status-rio-override').value = rio.status;
            document.getElementById('msg-rio').value = rio.message || "Cerrado por clima";

            toggleMsgs();
        }

        function toggleMsgs() {
            document.getElementById('group-pinos-msg').style.display = 
                document.getElementById('status-pinos-override').value === 'closed' ? 'block' : 'none';
            document.getElementById('group-rio-msg').style.display = 
                document.getElementById('status-rio-override').value === 'closed' ? 'block' : 'none';
        }

        document.getElementById('status-pinos-override').addEventListener('change', toggleMsgs);
        document.getElementById('status-rio-override').addEventListener('change', toggleMsgs);

        function saveConfigs() {
            const pinos = {
                status: document.getElementById('status-pinos-override').value,
                message: document.getElementById('msg-pinos').value
            };
            const rio = {
                status: document.getElementById('status-rio-override').value,
                message: document.getElementById('msg-rio').value
            };

            localStorage.setItem('bebidaAnimo_pinos', JSON.stringify(pinos));
            localStorage.setItem('bebidaAnimo_rio', JSON.stringify(rio));
            
            const btn = document.getElementById('btn-save');
            const originalText = btn.innerHTML;
            btn.innerHTML = "<i class='bx bx-check'></i> ¡Sincronizado!";
            btn.style.background = "var(--c-lime)";
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = "";
            }, 1500);
        }

        loadConfigs();
    </script>
</body>
</html>
